name: passing job values atri

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
jobs:
  job_1: #⬅️ Producer
    name: Add 3 and 7
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        #⬅️ Write to file
        run: |
          expr 3 + 7 > math-homework.txt 
      - name: Upload math result for job 1 #⬅️ Upload file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: homework_pre
          path: math-homework.txt
  job_2: #⬅️ Consumer
    name: Multiply by 9
    needs: job_1 #⬅️ Dependency
    runs-on: windows-latest
    steps:
      - name: Download math result for job 1 #⬅️ Download artifact
        uses: actions/download-artifact@v4
        with:
          name: homework_pre #⬅️ Specify which one to download
      - shell: bash
        #⬅️ Read file to environment variable
        # Execute operation
        run: |
          value=`cat math-homework.txt`
          expr $value \* 9 > math-homework.txt
